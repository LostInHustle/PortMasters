<!DOCTYPE html>
<html lang="zh-CN">

<title>PortMasters - 海上丝绸之路贸易大亨</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;

#app {

}

.control-panel {

.resource-row {

}

}

.shake { animation: shake 0.3s; }
@keyframes shake {
  0%, 100% { transform: translate(0, 0); }
  20% { transform: translate(-4px, -4px); }
  40% { transform: translate(4px, 4px); }

}

.worker-row {

<script>
// =====================================================================
// PortMasters - HTML Replica (Blizzard Engineering Patch v1.2 - State Machine Fix)
// =====================================================================

const ICONS = {
  "麻布": "🧶", "丝绸": "👘", "茶叶": "🍵",
  "麻衣": "👔", "布衣": "👕", "绫罗绸缎": "👗", "香囊": "🌸"
};
const COLORS = {
  "麻布": "#8B7355", "丝绸": "#DC143C", "茶叶": "#228B22",
  "麻衣": "#D2691E", "布衣": "#4169E1", "绫罗绸缎": "#8B008B", "香囊": "#FF1493"
};
const RESOURCES = ["麻布", "丝绸", "茶叶"];
const PRODUCTS = ["麻衣", "布衣", "绫罗绸缎", "香囊"];
const PORTS = ["泉州港", "广州港", "宁波港", "扬州港", "杭州港"];

const RECIPES = {
  "麻衣": { materials: {"麻布": 2}, value: 15, worker_type: "weaver" },
  "布衣": { materials: {"麻布": 2, "丝绸": 1}, value: 35, worker_type: "weaver" },
  "绫罗绸缎": { materials: {"丝绸": 3}, value: 60, worker_type: "master" },
  "香囊": { materials: {"丝绸": 1, "茶叶": 2}, value: 80, worker_type: "sachet_maker" }
};

const COMMODITIES = {
  "麻布": { ports: ["泉州港", "宁波港"], basePrice: [3, 6] },
  "丝绸": { ports: ["杭州港", "扬州港"], basePrice: [6, 10] },
  "茶叶": { ports: ["广州港", "泉州港"], basePrice: [10, 14] }
};

const PRODUCT_PRICES = {
  "麻衣": [30, 42], "布衣": [50, 65],
  "绫罗绸缎": [70, 90], "香囊": [95, 120]
};

const RESOURCE_PROBS = { "麻布": 0.4, "丝绸": 0.35, "茶叶": 0.25 };

const WAGES = { weaver: 8, master: 12, sachet_maker: 20 };

const BOONS = [
  { id: "silk_wind", name: "丝路顺风", icon: "🌬️", desc: "本回合运输丝绸及成品时，运费减半。", modifiers: {transport_silk_discount: 0.5} },
  { id: "favorable_tides", name: "顺风顺水", icon: "🌊", desc: "本回合基础运费减少4金币。", modifiers: {transport_flat_discount: 4} },
  { id: "merchant_charm", name: "商贾魅力", icon: "✨", desc: "本回合港口采购所有商品享85折优惠。", modifiers: {purchase_discount: 0.15} },
  { id: "artisan_inspiration", name: "匠人灵感", icon: "🔨", desc: "本回合所有工人每回合额外多生产1件商品。", modifiers: {worker_bonus_production: 1} },
  { id: "emergency_loan", name: "紧急钱庄", icon: "💰", desc: "立即获得40金币周转资金。", modifiers: {instant_gold: 40} },
  { id: "tax_shelter", name: "免税令", icon: "📜", desc: "本回合结算所得税率降至5%。", modifiers: {income_tax_override: 0.05} },
  { id: "hemp_monopoly", name: "麻布专营", icon: "🧶", desc: "本回合麻布采购单价降低2金币。", modifiers: {hemp_price_reduction: 2} },
  { id: "master_apprentice", name: "学徒传承", icon: "🎓", desc: "本回合雇佣工匠工资减半。", modifiers: {hire_discount: 0.5} }
];

const MODULES = [
  { id: "smugglers_hold", name: "走私暗舱", icon: "🏴‍☠️", desc: "采购成本-15%。所得税+20%。" },
  { id: "bulk_hauler", name: "散货索具", icon: "🏗️", desc: "每件货物运费-1。船只升级费用+15金币。" },
  { id: "artisans_workshop", name: "工匠工坊", icon: "🛠️", desc: "工人产量+1。工资+20%。" },
  { id: "tax_evasion", name: "避税账本", icon: "📕", desc: "所得税与增值税减半。15%概率在订单完成时罚款20金币(稽查)。" },
  { id: "silk_monopoly", name: "丝路垄断", icon: "👘", desc: "丝绸运费为0。丝绸产品订单报酬+20%。" },
  { id: "brokers_network", name: "牙行网络", icon: "🕵️", desc: "情报花费2金币。每次购买揭示2条密语。" },
  { id: "salvage_crane", name: "打捞起重机", icon: "♻️", desc: "30%概率在订单完成时退还运费。" },
  { id: "overdrive_engine", name: "超载引擎", icon: "⚙️", desc: "运费-5金币。维护费+10金币。" }
];

// =====================================================================
// Game State
// =====================================================================
const game = {
  inventory: { "麻布": 8, "丝绸": 5, "茶叶": 3, "麻衣": 0, "布衣": 0, "绫罗绸缎": 0, "香囊": 0 },
  money: 100, score: 0,
  currentRound: 1, maxRounds: 8,
  totalRevenue: 0, totalCosts: 0,
  materialCosts: 0, workerWages: 0, maintenanceCosts: 0,
  vatPaid: 0, incomeTaxPaid: 0,
  roundRevenue: 0, roundCosts: 0,
  weavers: [], masterWeavers: [], sachetMakers: [],
  fixedCost: 15,
  shipLevel: 0, shipUpgradeCost: [15, 25, 40],
  shipUpgradePenalty: 0, maintenancePenalty: 0,
  phase: 0,
  resourceCards: [], customerCards: [],
  purchasedCards: new Set(), completedOrders: new Set(),
  purchaseCount: 0, orderCount: 0,
  gameOver: false,
  modifierFlags: {},
  phase2DemandTags: [], revealedIntel: [], intelCost: 5,
  intelOrderUsed: false,
  equippedModules: []
};

const logs = [];

// =====================================================================
// Utility
// =====================================================================
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function choice(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function weightedChoice(items) {
  const total = items.reduce((s, [, w]) => s + w, 0);
  let r = Math.random() * total;
  for (const [item, w] of items) { r -= w; if (r <= 0) return item; }
  return items[0][0];
}

function log(msg) {
  logs.push(msg);
  if (logs.length > 500) logs.shift();
  renderLog();
}

function hasModule(id) { return game.equippedModules.some(m => m.id === id); }

// =====================================================================
// Calculations
// =====================================================================
function calcTransportCost(totalItems, hasSilk = false) {
  let base = totalItems * 2;
  let discount = game.shipLevel * 5;
  if (game.modifierFlags.transport_flat_discount) discount += game.modifierFlags.transport_flat_discount;
  let cost = Math.max(5, base - discount);
  if (hasSilk && game.modifierFlags.transport_silk_discount) {
    cost = Math.max(5, Math.floor(cost * game.modifierFlags.transport_silk_discount));
  }
  if (hasModule('bulk_hauler')) cost = Math.max(0, cost - totalItems);
  if (hasModule('overdrive_engine')) cost = Math.max(0, cost - 5);
  if (hasModule('silk_monopoly') && hasSilk) cost = 0;
  return Math.max(0, cost);
}

function calcVAT(product, sellingPrice) {
  const recipe = RECIPES[product];
  let matCost = 0;
  for (const [m, a] of Object.entries(recipe.materials)) {
    const avg = (COMMODITIES[m].basePrice[0] + COMMODITIES[m].basePrice[1]) / 2;
    matCost += avg * a;
  }
  let workerCost = WAGES[recipe.worker_type];
  const taxable = sellingPrice - matCost - workerCost;
  if (taxable > 0) {
    let vat = Math.floor(taxable * 0.05);
    if (hasModule('tax_evasion')) vat = Math.floor(vat * 0.5);
    return vat;
  }
  return 0;
}

function calcIncomeTax(preTax) {
  if (preTax <= 0) return 0;
  const rate = game.modifierFlags.income_tax_override || 0.1;
  let tax = Math.floor(preTax * rate);
  if (hasModule('smugglers_hold')) tax = Math.floor(tax * 1.2);
  if (hasModule('tax_evasion')) tax = Math.floor(tax * 0.5);
  return tax;
}

function getCardFinalCost(card) {
  let cost = card.totalCost;
  if (game.modifierFlags.purchase_discount) {
    cost = Math.floor(cost * (1 - game.modifierFlags.purchase_discount));
  }
  if (game.modifierFlags.hemp_price_reduction) {
    for (const r of card.resources) {
      if (r.type === "麻布") cost -= r.quantity * game.modifierFlags.hemp_price_reduction;
    }
  }
  if (hasModule('smugglers_hold')) cost = Math.floor(cost * 0.85);
  return Math.max(0, cost);
}

function getHireCost(type) {
  let wage = WAGES[type];
  if (game.modifierFlags.hire_discount) wage = Math.floor(wage * (1 - game.modifierFlags.hire_discount));
  return wage;
}

// =====================================================================
// Order/Card Generation
// =====================================================================
function genRawOrder(filter = null) {
  const num = rand(1, 3);
  const resources = [];
  const available = [...RESOURCES];
  const port = choice(PORTS);
  let total = 0;
  if (filter && RESOURCES.includes(filter)) {
    const req = rand(2, 5);
    total += req;
    resources.push({ type: filter, required: req });
  } else {
    for (let i = 0; i < num; i++) {
      if (!available.length) break;
      const r = choice(available);
      available.splice(available.indexOf(r), 1);
      const req = rand(2, 5);
      total += req;
      resources.push({ type: r, required: req });
    }
  }
  const base = resources.reduce((s, r) => s + r.required * 5, 0);
  const reward = base + rand(10, 25);
  return { demandPort: port, resources, reward, totalItems: total, isProductOrder: false };
}

function genProductOrder(filter = null) {
  const product = (filter && PRODUCTS.includes(filter)) ? filter : choice(PRODUCTS);
  const req = rand(1, 3);
  const port = choice(PORTS);
  const basePrice = rand(...PRODUCT_PRICES[product]);
  return {
    demandPort: port,
    resources: [{ type: product, required: req }],
    reward: basePrice * req,
    totalItems: req,
    isProductOrder: true
  };
}

function genMixedOrder() {
  if (game.revealedIntel.length && !game.intelOrderUsed) {
    const intel = choice(game.revealedIntel);
    game.intelOrderUsed = true;
    if (RESOURCES.includes(intel.item)) return genRawOrder(intel.item);
    if (PRODUCTS.includes(intel.item)) return genProductOrder(intel.item);
  }
  return Math.random() < 0.5 ? genRawOrder() : genProductOrder();
}

function genResourceCard() {
  if (Math.random() < 0.3) return genProductPurchaseCard();
  const num = rand(1, 3);
  const resources = [];
  const available = Object.keys(RESOURCE_PROBS);
  const probs = Object.values(RESOURCE_PROBS);
  const port = choice(PORTS);
  for (let i = 0; i < num; i++) {
    if (!available.length) break;
    let r = Math.random(), acc = 0, chosen = available[0];
    for (let j = 0; j < available.length; j++) {
      acc += probs[j];
      if (r <= acc) { chosen = available[j]; break; }
    }
    const idx = available.indexOf(chosen);
    available.splice(idx, 1);
    probs.splice(idx, 1);
    const qty = rand(1, 3);
    const [min, max] = COMMODITIES[chosen].basePrice;
    const base = rand(min, max);
    const price = COMMODITIES[chosen].ports.includes(port) ? base - 1 : base + 1;
    resources.push({ type: chosen, quantity: qty, price });
  }
  const total = resources.reduce((s, r) => s + r.quantity * r.price, 0);
  return { port, resources, totalCost: total, isProductCard: false };
}

function genProductPurchaseCard() {
  const product = choice(PRODUCTS);
  const qty = rand(1, 2);
  const port = choice(PORTS);
  const recipe = RECIPES[product];
  let matCost = 0;
  const details = [];
  for (const [m, a] of Object.entries(recipe.materials)) {
    const avg = (COMMODITIES[m].basePrice[0] + COMMODITIES[m].basePrice[1]) / 2;
    matCost += avg * a;
    details.push(`${m}×${a}`);
  }
  const markup = 1.4 + Math.random() * 0.4;
  let unitPrice = Math.floor(matCost * markup);
  const [min, max] = PRODUCT_PRICES[product];
  unitPrice = Math.max(min, Math.min(unitPrice, max));
  return {
    port, resources: [{
      type: product, quantity: qty, price: unitPrice,
      materialCost: matCost, materialDetails: details.join(" + ")
    }],
    totalCost: unitPrice * qty, isProductCard: true
  };
}

// =====================================================================
// Game Actions
// =====================================================================
function applyBoon(boon) {
  game.modifierFlags = boon.modifiers;
  if (boon.modifiers.instant_gold) {
    game.money += boon.modifiers.instant_gold;
    log(`💰 福缘生效：立刻获得 ${boon.modifiers.instant_gold} 金币！`);
  }
  render();
}

function purchaseCard(card) {
  if (game.purchasedCards.has(card.id)) return;
  const cost = getCardFinalCost(card);
  if (game.money < cost) { log(`❌ 资金不足！需要${cost}金币，当前${game.money}金币`); return; }
  game.money -= cost;
  game.roundCosts += cost;
  game.totalCosts += cost;
  for (const r of card.resources) game.inventory[r.type] += r.quantity;
  game.purchasedCards.add(card.id);
  game.purchaseCount++;
  if (card.isProductCard) {
    const r = card.resources[0];
    log(`🛒 在${card.port}采购成品: ${ICONS[r.type]}${r.type}×${r.quantity}(@${r.price}💰/个, 原料成本${r.materialCost}💰)，总花费${cost}金币`);
    log("   💡 提示：该成品出售时需缴纳增值税");
  } else {
    const txt = card.resources.map(r => `${ICONS[r.type]}${r.type}×${r.quantity}(${r.price}💰/个)`).join(" + ");
    log(`🛒 在${card.port}采购: ${txt}，总花费${cost}金币`);
    if (cost < card.totalCost) log(`   ✨ 折扣生效！节省了 ${card.totalCost - cost} 金币`);
  }
  log(`📊 已采购 ${game.purchaseCount} 批货物`);
  triggerJuice();
  render();
}

function completeOrder(order) {
  if (game.completedOrders.has(order.id)) return;
  for (const r of order.resources) {
    if ((game.inventory[r.type] || 0) < r.required) {
      log(`❌ 库存不足！需要${r.type}×${r.required}`);
      return;
    }
  }
  const hasSilk = order.resources.some(r => ["丝绸", "绫罗绸缎", "香囊", "布衣"].includes(r.type));
  let transport = calcTransportCost(order.totalItems, hasSilk);
  for (const r of order.resources) game.inventory[r.type] -= r.required;
  let reward = order.reward;
  let totalVat = 0;
  if (order.isProductOrder) {
    const product = order.resources[0].type;
    const unitVat = calcVAT(product, reward / order.resources[0].required);
    totalVat = unitVat * order.resources[0].required;
    reward -= totalVat;
    game.vatPaid += totalVat;
    log(`🧾 成品销售增值税: ${totalVat}金币`);
  }
  game.money -= transport;
  game.roundCosts += transport;
  game.totalCosts += transport;
  const origTransport = transport;
  if (hasModule('silk_monopoly') && hasSilk) {
    reward = Math.floor(reward * 1.2);
    log("👘 丝路垄断：报酬+20%！");
  }
  if (hasModule('salvage_crane') && Math.random() < 0.3) {
    game.money += transport;
    log(`♻️ 打捞起重机：退还了${transport}金币运费！`);
    transport = 0;
  }
  if (hasModule('tax_evasion') && Math.random() < 0.15) {
    game.money -= 20;
    log("🚨 稽查！避税账本触发，损失20金币！");
  }
  if (transport !== origTransport) {
    const diff = origTransport - transport;
    game.money += diff;
    game.roundCosts -= diff;
    game.totalCosts -= diff;
  }
  game.money += reward;
  game.roundRevenue += reward;
  game.totalRevenue += reward;
  game.score += Math.floor(reward - transport);
  game.completedOrders.add(order.id);
  game.orderCount++;
  const txt = order.resources.map(r => `${ICONS[r.type]}${r.type}×${r.required}`).join(" + ");
  log(`📦 完成${order.demandPort}的订单: ${txt}`);
  log(`   💰 报酬: ${reward}金币 - ⚓ 运费: ${transport}金币 = 📊 净利润: ${reward - transport}金币`);
  log(`📊 已完成 ${game.orderCount} 笔交易`);
  triggerJuice();
  render();
}

function hireWorker(type) {
  const wage = getHireCost(type);
  if (game.money < wage) { log("❌ 资金不足，无法雇佣工人！"); return; }
  const names = { weaver: "织女", master: "纺织大师", sachet_maker: "香囊师" };
  const icons = { weaver: "👩‍🔧", master: "👩‍🎨", sachet_maker: "🌸" };
  const list = type === 'weaver' ? game.weavers : type === 'master' ? game.masterWeavers : game.sachetMakers;
  list.push({ task: null, progress: 0, producedCount: 0, isSkilled: false });
  log(`${icons[type]} 雇佣了一名${names[type]}！工资: ${wage}金币/回合（每回合结算时支付）`);
  triggerJuice();
  render();
}

function fireWorker(type, idx) {
  const list = type === 'weaver' ? game.weavers : type === 'master' ? game.masterWeavers : game.sachetMakers;
  const wage = WAGES[type];
  const names = { weaver: "织女", master: "纺织大师", sachet_maker: "香囊师" };
  if (idx < 0 || idx >= list.length) return;
  if (game.money < wage) { log(`❌ 资金不足，无法支付${names[type]}的遣散费: ${wage}金币`); return; }
  game.money -= wage;
  const worker = list.splice(idx, 1)[0];
  log(`💔 解雇了一名${names[type]}，支付遣散费: ${wage}金币`);
  if (worker.task) log(`  该工人原本正在制作: ${worker.task}`);
  render();
}

function assignTask(type, task) {
  const list = type === 'weaver' ? game.weavers : type === 'master' ? game.masterWeavers : game.sachetMakers;
  const recipe = RECIPES[task];
  for (const worker of list) {
    if (worker.task === null) {
      let can = true;
      for (const [m, a] of Object.entries(recipe.materials)) {
        if ((game.inventory[m] || 0) < a) { can = false; break; }
      }
      if (!can) { log(`❌ 材料不足，无法生产${task}！`); return; }
      for (const [m, a] of Object.entries(recipe.materials)) game.inventory[m] -= a;
      worker.task = task;
      worker.progress = 0;
      const matTxt = Object.entries(recipe.materials).map(([m, a]) => `${ICONS[m]}${m}×${a}`).join(' + ');
      log(`📋 为工人分配任务：生产${ICONS[task]}${task}（原料：${matTxt}）`);
      render();
      return;
    }
  }
  log("❌ 所有工人都已分配任务！");
}

function processProduction() {
  const bonus = game.modifierFlags.worker_bonus_production || 0;
  const allLists = [
    { list: game.weavers, name: "织女", type: "weaver" },
    { list: game.masterWeavers, name: "纺织大师", type: "master" },
    { list: game.sachetMakers, name: "香囊师", type: "sachet_maker" }
  ];
  for (const { list, name, type } of allLists) {
    for (const w of list) {
      if (w.task) {
        let base = w.isSkilled ? 2 : 1;
        let amt = base + bonus;
        if (hasModule('artisans_workshop')) amt += 1;
        game.inventory[w.task] = (game.inventory[w.task] || 0) + amt;
        w.producedCount = (w.producedCount || 0) + amt;
        if (amt > base) log(`✅ ${name}(熟练)完成了 ${amt} 件${ICONS[w.task]}${w.task}的制作！（加成）`);
        else if (w.isSkilled) log(`✅ ${name}(熟练)完成了2件${ICONS[w.task]}${w.task}的制作！`);
        else log(`✅ ${name}完成了${ICONS[w.task]}${w.task}的制作！`);
        if (w.producedCount >= 2 && !w.isSkilled) {
          w.isSkilled = true;
          log(`⭐ ${name}经验提升！现在每回合可生产2件产品！`);
        }
        w.task = null;
        w.progress = 0;
      }
    }
  }
}

function payWages() {
  let total = 0;
  const countWorkers = (list, type) => {
    let w = 0;
    for (const _ of list) {
      let wage = WAGES[type];
      if (hasModule('artisans_workshop')) wage = Math.floor(wage * 1.2);
      w += wage;
    }
    return w;
  };
  const ww = countWorkers(game.weavers, 'weaver');
  const mw = countWorkers(game.masterWeavers, 'master');
  const sw = countWorkers(game.sachetMakers, 'sachet_maker');
  total = ww + mw + sw;
  if (total === 0) return true;
  if (game.money >= total) {
    game.money -= total;
    game.workerWages += total;
    game.roundCosts += total;
    if (ww > 0) log(`💰 支付了${game.weavers.length}名织女的工资：${ww}金币`);
    if (mw > 0) log(`💰 支付了${game.masterWeavers.length}名纺织大师的工资：${mw}金币`);
    if (sw > 0) log(`💰 支付了${game.sachetMakers.length}名香囊师的工资：${sw}金币`);
    return true;
  }
  log(`⚠️ 资金不足！应付工资: ${total}金币，当前资金: ${game.money}金币`);
  log("💥 无法支付工人工资，工匠们罢工离去...");
  log("💥 商队信誉崩塌，被迫破产！");
  return "bankruptcy";
}

function payMaintenance() {
  const cost = game.fixedCost + game.maintenancePenalty;
  if (game.money >= cost) {
    game.money -= cost;
    game.maintenanceCosts += cost;
    game.roundCosts += cost;
    game.totalCosts += cost;
    log(`💸 支付了船只维护费: ${cost}金币`);
    return true;
  }
  if (game.money > 0) {
    const paid = game.money;
    game.money = 0;
    game.maintenanceCosts += paid;
    game.roundCosts += paid;
    game.totalCosts += paid;
    log(`⚠️ 强制支付了 ${paid}金币（需要 ${cost}金币）`);
    log("⚠️ 资金耗尽！无法继续航行...");
    return "bankruptcy";
  }
  return "bankruptcy";
}

function endRound() {
  log(`\n📊=== 第${game.currentRound}航程结算 ===`);
  log(`💰 本航程总收入: ${game.roundRevenue}金币`);
  const totalCost = game.roundCosts + game.maintenanceCosts + game.workerWages;
  log(`💸 本航程总成本: ${totalCost}金币`);
  log(`   🔧 维护费: ${game.maintenanceCosts}金币`);
  log(`   📦 材料费: ${game.materialCosts}金币`);
  log(`   👥 工人工资: ${game.workerWages}金币`);
  const preTax = game.roundRevenue - totalCost;
  log(`📈 税前净利润: ${preTax}金币`);
  const tax = calcIncomeTax(preTax);
  if (tax > 0) {
    game.money -= tax;
    game.incomeTaxPaid += tax;
    const rate = (game.modifierFlags.income_tax_override || 0.1) * 100;
    log(`🏛️ 缴纳所得税（${rate.toFixed(0)}%）: ${tax}金币`);
  } else log("🏛️ 无盈利，无需缴纳所得税");
  if (game.vatPaid > 0) log(`🧾 本航程已缴增值税: ${game.vatPaid}金币`);
  
  game.modifierFlags = {};
  game.phase2DemandTags = [];
  game.revealedIntel = [];
  game.intelOrderUsed = false;
  game.roundRevenue = 0;
  game.roundCosts = 0;
  game.maintenanceCosts = 0;
  game.materialCosts = 0;
  game.workerWages = 0;
  game.currentRound++;
  if (game.currentRound > game.maxRounds) { endGame(); return; }
  log(`\n🔄=== 第${game.currentRound}航程准备开始 ===`);
  game.phase = 0;
  game.purchaseCount = 0;
  game.orderCount = 0;
  game.resourceCards = [];
  game.customerCards = [];
  game.purchasedCards.clear();
  game.completedOrders.clear();
  startBoonDrafting();
}

function purchaseIntel() {
  if (!game.phase2DemandTags.length) { log("🔮 牙行已无更多密语..."); render(); return; }
  if (game.money < game.intelCost) { log(`❌ 需要${game.intelCost}金币才能购买消息`); render(); return; }
  const count = hasModule('brokers_network') ? 2 : 1;
  for (let i = 0; i < count; i++) {
    if (!game.phase2DemandTags.length) break;
    const item = choice(game.phase2DemandTags);
    game.phase2DemandTags.splice(game.phase2DemandTags.indexOf(item), 1);
    const port = choice(PORTS);
    game.revealedIntel.push({ item, port });
    log(`🗣️ 牙行密语：'来自${port}的消息：对${item}的需求量很大！'`);
    game.money -= game.intelCost;
  }
  render();
}

function upgradeShip() {
  if (game.shipLevel >= 3) return;
  const cost = game.shipUpgradeCost[game.shipLevel] + game.shipUpgradePenalty;
  if (game.money < cost) { alert(`需要 ${cost} 金币`); return; }
  game.money -= cost;
  game.shipLevel++;
  log(`🎉 商船升级到 ${game.shipLevel}级！+1模块槽位，+5运费折扣`);
  triggerJuice();
  render();
}

function equipModule(mod, swapIdx = null) {
  if (swapIdx !== null) {
    const old = game.equippedModules[swapIdx];
    if (old.id === 'bulk_hauler') game.shipUpgradePenalty -= 15;
    if (old.id === 'overdrive_engine') game.maintenancePenalty -= 10;
    if (old.id === 'brokers_network') game.intelCost = 5;
    game.equippedModules[swapIdx] = mod;
    log(`🔄 将 ${old.name} 替换为 ${mod.name}！`);
  } else {
    if (game.equippedModules.length < game.shipLevel) {
      game.equippedModules.push(mod);
      log(`✅ 安装了 ${mod.name}！`);
    } else { log("❌ 没有空槽位！必须替换。"); return; }
  }
  if (mod.id === 'bulk_hauler') game.shipUpgradePenalty += 15;
  if (mod.id === 'overdrive_engine') game.maintenancePenalty += 10;
  if (mod.id === 'brokers_network') game.intelCost = 2;
  triggerJuice();
  render();
}

// Phase Management
// =====================================================================
function startBoonDrafting() {
  game.phase = 5;
  log("\n🧭=== 航海家的罗盘 ===");
  log("选择一项福缘，扭转本航程的规则...");
  render();
}

function selectBoon(boon) {
  log(`🧭 福缘已选定：${boon.icon} ${boon.name}`);
  applyBoon(boon);
  startPhase1(); // FIX: Proceed directly to Phase 1 instead of looping back to Welcome
}

function selectBoonById(id) {
  const boon = BOONS.find(b => b.id === id);
  if (boon) selectBoon(boon);
}

function showWelcome() {
  game.phase = 0;
  log("=".repeat(50));
  log("⚓ 欢迎来到PortMasters海上丝绸之路贸易大亨！");
  log("🚢 穿梭于各大港口之间，建立您的商业帝国！");
  log("👥 雇佣工匠，制作精美商品，获取更高利润！");
  log("=".repeat(50));
  render();
}

function startPhase1() {
  game.phase = 1;
  game.purchaseCount = 0;
  game.purchasedCards.clear();
  game.phase2DemandTags = [];
  const allItems = [...RESOURCES, ...PRODUCTS];
  for (let i = 0; i < 5; i++) {
    let t = choice(allItems);
    if (!game.phase2DemandTags.includes(t)) game.phase2DemandTags.push(t);
  }
  game.revealedIntel = [];
  game.intelOrderUsed = false;
  log(`\n⚓=== 第${game.currentRound}航程 - 阶段1: 港口采购 ===`);
  log(`💰 当前资金: ${game.money}金币`);
  game.resourceCards = [];
  for (let i = 0; i < 5; i++) {
    const c = genResourceCard();
    c.id = i;
    game.resourceCards.push(c);
  }
  render();
}

function completePhase1() {
  if (game.purchaseCount === 0) log("⏭️ 跳过了采购阶段");
  else log(`✅ 采购结束，共采购 ${game.purchaseCount} 批货物`);
  game.phase = 'worker_mgmt';
  render();
}

function startPhase2() {
  game.phase = 2;
  game.orderCount = 0;
  game.completedOrders.clear();
  log(`\n🤝=== 第${game.currentRound}航程 - 阶段2: 贸易交易 ===`);
  game.customerCards = [];
  for (let i = 0; i < 5; i++) {
    const o = genMixedOrder();
    o.id = i;
    game.customerCards.push(o);
  }
  render();
}

function completePhase2() {
  if (game.orderCount === 0) log("⏭️ 跳过了交易阶段");
  else log(`✅ 交易结束，共完成 ${game.orderCount} 笔交易`);
  startPhase3();
}

function startPhase3() {
  game.phase = 3;
  log("\n👥=== 处理工人生产 ===");
  processProduction();
  log("\n💰=== 支付工人工资 ===");
  const wageResult = payWages();
  if (wageResult === "bankruptcy") {
    log("⚠️ 因无法支付工人工资而破产！");
    game.gameOver = true;
    game.phase = 'bankruptcy';
    render();
    return;
  }
  log(`\n🔧=== 第${game.currentRound}航程 - 阶段3: 船只维护 ===`);
  if (game.money <= 0) {
    log("⚠️ 资金为0，无法支付维护费！");
    game.gameOver = true;
    game.phase = 'bankruptcy';
    render();
    return;
  }
  render();
}

function doMaintenance() {
  const r = payMaintenance();
  if (r === "bankruptcy") {
    game.gameOver = true;
    game.phase = 'bankruptcy';
    render();
    return;
  }
  startPhase4();
}

function startPhase4() {
  game.phase = 4;
  log(`\n🚢=== 第${game.currentRound}航程 - 阶段4: 船坞与模块 ===`);
  render();
}

function skipUpgrade() {
  log("⏭️ 跳过船坞操作");
  endRound();
}

function endGame() {
  game.gameOver = true;
  game.phase = 'endgame';
  log("\n" + "=".repeat(50));
  log("🎮 PortMasters - 游戏结束!");
  log(`💰 最终资金: ${game.money}金币`);
  log(`🏆 最终声望: ${game.score}`);
  log(`🧾 累计缴税: ${game.vatPaid + game.incomeTaxPaid}金币`);
  let rating;
  if (game.score >= 300) rating = "👑 丝绸之路霸主";
  else if (game.score >= 200) rating = "🏆 海上贸易大亨";
  else if (game.score >= 100) rating = "⭐ 成功商人";
  else if (game.score >= 50) rating = "👍 合格商人";
  else rating = "🌊 新手商人";
  log(`📈 评级: ${rating}`);
  log("=".repeat(50));
  localStorage.removeItem('portmasters_save');
  render();
}

function restartGame() {
  if (!confirm("确定要重新开始海上丝绸之路贸易之旅吗？")) return;
  Object.assign(game, {
    inventory: { "麻布": 8, "丝绸": 5, "茶叶": 3, "麻衣": 0, "布衣": 0, "绫罗绸缎": 0, "香囊": 0 },
    money: 100, score: 0, currentRound: 1,
    totalRevenue: 0, totalCosts: 0, materialCosts: 0, workerWages: 0, maintenanceCosts: 0,
    vatPaid: 0, incomeTaxPaid: 0, roundRevenue: 0, roundCosts: 0,
    weavers: [], masterWeavers: [], sachetMakers: [],
    shipLevel: 0, shipUpgradePenalty: 0, maintenancePenalty: 0,
    phase: 0, gameOver: false, purchaseCount: 0, orderCount: 0,
    resourceCards: [], customerCards: [],
    purchasedCards: new Set(), completedOrders: new Set(),
    modifierFlags: {}, phase2DemandTags: [], revealedIntel: [],
    intelOrderUsed: false, equippedModules: [], intelCost: 5
  });
  logs.length = 0;
  localStorage.removeItem('portmasters_save');
  showWelcome();
}

function nextPhase() {
  if (game.phase === 1) completePhase1();
  else if (game.phase === 'worker_mgmt') startPhase2(); // FIX: Allow advancing from Worker Mgmt
  else if (game.phase === 2) completePhase2();
  else if (game.phase === 3) doMaintenance();
  else if (game.phase === 4) skipUpgrade();
}

// =====================================================================
// Save/Load
// =====================================================================
function saveGame() {
  const data = {
    ...game,
    purchasedCards: [...game.purchasedCards],
    completedOrders: [...game.completedOrders]
  };
  try {
    localStorage.setItem('portmasters_save', JSON.stringify(data));
    log("💾 游戏已保存！");
    alert("游戏进度已保存！");
  } catch (e) {
    log(`❌ 保存失败: ${e}`);
  }
}

function loadGame() {
  try {
    const raw = localStorage.getItem('portmasters_save');
    if (!raw) return false;
    const d = JSON.parse(raw);
    Object.assign(game, d);
    game.purchasedCards = new Set(d.purchasedCards || []);
    game.completedOrders = new Set(d.completedOrders || []);
    log("📂 存档已加载！");
    render();
    return true;
  } catch (e) {
    log(`❌ 加载失败: ${e}`);
    return false;
  }
}

// =====================================================================
// Juice Effects
// =====================================================================
function triggerJuice() {
  playSound();
  shakeWindow();
  particleBurst();
}

function playSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(440, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    osc.start(); osc.stop(ctx.currentTime + 0.3);
  } catch (e) {}
}

function particleBurst() {
  const canvas = document.getElementById('particles-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const particles = [];
  const colors = ["#FFD700", "#FFA500", "#4CAF50", "#2E5AA7", "#FFFFFF"];
  const emojis = ["✨", "⭐", "💫", "🪙", "🎋"];
  for (let i = 0; i < 35; i++) {
    particles.push({
      x: cx, y: cy,
      vx: (Math.random() - 0.5) * 16,
      vy: (Math.random() - 0.5) * 16 - 4,
      r: 5 + Math.random() * 10,
      color: choice(colors),
      life: 1
    });
  }
  const texts = [];
  for (let i = 0; i < 5; i++) {
    texts.push({
      x: cx + (Math.random() - 0.5) * 80,
      y: cy + (Math.random() - 0.5) * 80,
      vx: (Math.random() - 0.5) * 6,
      vy: -2 - Math.random() * 3,
      emoji: choice(emojis),
      life: 1
    });
  }
  let step = 0;
  const animate = () => {
    if (step++ > 30) { ctx.clearRect(0, 0, canvas.width, canvas.height); return; }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy; p.vy += 0.5; p.life -= 0.03;
      if (p.life > 0) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    for (const t of texts) {
      t.x += t.vx; t.y += t.vy; t.life -= 0.03;
      if (t.life > 0) {
        ctx.globalAlpha = t.life;
        ctx.font = "24px sans-serif";
        ctx.fillText(t.emoji, t.x, t.y);
      }
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(animate);
  };
  animate();
}

function renderBoonDraft(p) {
  const gs = {
    money: game.money, inventory: game.inventory,
    weavers: game.weavers, master_weavers: game.masterWeavers,
    sachet_makers: game.sachetMakers
  };
  const weightFuncs = {
    silk_wind: () => (gs.inventory["丝绸"] || 0) > 2 || gs.master_weavers.length > 0 ? 2.5 : 0.8,
    favorable_tides: () => 1.5,
    merchant_charm: () => gs.money > 40 ? 2.0 : 0.5,
    artisan_inspiration: () => (gs.weavers.length + gs.master_weavers.length + gs.sachet_makers.length) > 0 ? 3.0 : 0.0,
    emergency_loan: () => gs.money < 30 ? 4.0 : 0.2,
    tax_shelter: () => 1.5,
    hemp_monopoly: () => (gs.inventory["麻布"] || 0) < 5 || gs.weavers.length > 0 ? 2.0 : 1.0,
    master_apprentice: () => 1.5
  };
  const available = BOONS.map(b => [b, weightFuncs[b.id]()]).filter(([, w]) => w > 0);
  const picks = [];
  const pool = [...available];
  for (let i = 0; i < 3; i++) {
    if (!pool.length) break;
    picks.push(weightedChoice(pool));
    pool.splice(pool.findIndex(x => x[0].id === picks[picks.length-1].id), 1);
  }
  p.innerHTML = `

      <div class="hero-title">🧭 航海家的罗盘</div>

}

function startModuleDrafting() {
  const available = MODULES.filter(m => !game.equippedModules.some(eq => eq.id === m.id));
  const pool = available.length >= 3 ? available : MODULES;
  const picks = [];
  const copy = [...pool];
  for (let i = 0; i < 3; i++) {
    if (!copy.length) break;
    const idx = Math.floor(Math.random() * copy.length);
    picks.push(copy.splice(idx, 1)[0]);
  }
  game._draftChoices = picks;
  game.phase = 'module_draft';
  render();
}

  p.innerHTML = `

function handleModuleSelect(idx) {

}

function renderControls() {
  const c = document.getElementById('control-panel');
  let startText, startDisabled, startAction, nextText, nextDisabled;
  
  if (game.gameOver) {
    startText = "⚠️ 游戏结束"; startDisabled = true; startAction = "";
    nextText = "⏭️ 继续航行"; nextDisabled = true;
  } else if (game.phase === 0) {
    startText = `🚢 开始第${game.currentRound}航程`; startDisabled = false; startAction = "startBoonDrafting()";

  c.innerHTML = `

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

let _tutStep = 0;

function showTutorial(step) {
  _tutStep = (step === undefined ? 0 : step);
  const total = TUTORIAL_STEPS.length;
  const s = TUTORIAL_STEPS[_tutStep];
  const pct = Math.round(((_tutStep + 1) / total) * 100);
  const isLast = _tutStep === total - 1;
  showModal(`
    <div style="max-width:500px;margin:0 auto;font-family:inherit">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
        <h2 style="margin:0;color:#1A3C8C;font-size:18px;line-height:1.3;flex:1">${s.title}</h2>
        <button onclick="closeTutorial()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#ccc;padding:0 0 0 12px;line-height:1;flex-shrink:0" title="关闭">✕</button>
      </div>
      <div style="background:#ebebeb;border-radius:3px;height:4px;margin-bottom:18px">
        <div style="background:#2E5AA7;height:4px;border-radius:3px;width:${pct}%;transition:width 0.35s ease"></div>
      </div>
      <div style="font-size:14px;line-height:1.7;color:#333;min-height:155px">${s.content}</div>
      <div style="margin-top:18px;padding-top:14px;border-top:1px solid #eee">
        <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px">
          <div>
            <button class="btn" onclick="${_tutStep > 0 ? `showTutorial(${_tutStep - 1})` : ''}"
              ${_tutStep === 0 ? 'disabled' : ''}
              style="${_tutStep === 0 ? 'opacity:0.2;cursor:default;' : ''}padding:8px 16px">上一步</button>
          </div>
          <span style="font-size:12px;color:#aaa;white-space:nowrap;text-align:center">${_tutStep + 1} / ${total}</span>
          <div style="text-align:right">
            ${isLast
              ? `<button class="btn btn-success" onclick="closeTutorial()" style="padding:8px 22px;font-weight:bold">🚢 扬帆起航！</button>`
              : `<button class="btn btn-success" onclick="showTutorial(${_tutStep + 1})" style="padding:8px 22px">继续</button>`}
          </div>
        </div>
        <div style="text-align:center;margin-top:11px">
          <span onclick="closeTutorial()" style="font-size:12px;color:#bbb;cursor:pointer;text-decoration:underline;text-underline-offset:3px">跳过教程</span>
        </div>
      </div>
    </div>`);
}

function closeTutorial() {
  localStorage.setItem('portmasters_tutorial_seen', '1');
  closeModal();
}

// =====================================================================
// Keyboard Shortcuts
// =====================================================================
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveGame(); }
  else if (e.ctrlKey && e.key === 'n') { e.preventDefault(); nextPhase(); }
  else if (e.ctrlKey && e.key === 'r') { e.preventDefault(); restartGame(); }
  else if (e.key === 'F1') { e.preventDefault(); showInstructions(); }
});

// =====================================================================
// Init
// =====================================================================
window.addEventListener('load', () => {
  if (localStorage.getItem('portmasters_save')) {
    if (confirm("检测到上次的存档，是否继续游戏？")) {
      if (loadGame()) return;
    }
  } showWelcome();
  if (!localStorage.getItem('portmasters_tutorial_seen')) { showTutorial(0); }
});
</script>
